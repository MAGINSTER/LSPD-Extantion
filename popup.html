<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LSPD Forum Helper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <h1>LSPD Forum Helper</h1>
      <p>Быстрый доступ к форуму и удобные действия.</p>
      <button id="openForum">Открыть форум</button>
      <button id="toggleHelper">Отключить помощник</button>
      <div id="status" class="status">Статус: активен</div>
      
      <div class="quick-answers">
        <h2>Быстрые ответы</h2>
        <div id="quickAnswersList" class="quick-answers-list"></div>
        <div class="quick-answer-input">
          <input type="text" id="newAnswer" placeholder="Новый быстрый ответ..." />
          <button id="addAnswer">Добавить</button>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
